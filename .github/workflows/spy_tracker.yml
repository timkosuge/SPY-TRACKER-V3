name: SPY Daily Tracker

on:
  schedule:
    # Every 30 minutes during US market hours (9:00 AM – 4:30 PM ET = 13:00–20:30 UTC), Mon–Fri
    - cron: '0,30 13-20 * * 1-5'
    # After-close final run at 6:15 PM ET (22:15 UTC) — full end-of-day data
    - cron: '15 22 * * 1-5'
    # Monday pre-market run at 8:30 AM ET (13:30 UTC) — catch weekend data
    - cron: '30 13 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-spy-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pytz yfinance pandas market-calendar-tool

      - name: Run SPY tracker
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python fetch_and_analyze.py

      - name: Generate analog data
        run: python generate_analog.py

      - name: Generate time-of-day stats
        run: python generate_tod_stats.py

      - name: Generate expiry data (all trading days)
        run: python generate_expiry_data.py

      - name: Generate intraday patterns
        run: python generate_intraday_patterns.py

      - name: Generate decline/drawdown data
        run: python generate_decline_data.py

      - name: Generate relief rally data
        run: python generate_relief_data.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main
          git add -f spy_data.db spy_data.json market_data.json \
                     analog_data.js tod_stats.js \
                     intraday_library.js expiry_data.js \
                     intraday_patterns.js decline_data.js relief_data.js \
                     window_stats.js gap_stats.js \
                     session_vol_profile.js intraday_vol_profile.js intraday_vol_stats.js
          git diff --staged --quiet && echo "No changes" || git commit -m "Auto: SPY data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"

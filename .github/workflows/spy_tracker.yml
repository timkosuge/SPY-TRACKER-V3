name: SPY Daily Tracker

on:
  schedule:
    # Every 30 minutes during US market hours (9:00 AM – 4:30 PM ET = 13:00–20:30 UTC), Mon–Fri
    - cron: '0,30 13-20 * * 1-5'
    # Catch the 4:00–4:30 PM ET window (20:00–20:30 UTC already covered above)
    # After-close final run at 6:15 PM ET (22:15 UTC) — full end-of-day data
    - cron: '15 22 * * 1-5'
    # Monday pre-market run at 8:30 AM ET (13:30 UTC) — catch weekend data
    - cron: '30 13 * * 1'
  workflow_dispatch:

jobs:
  fetch-spy-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pytz yfinance pandas market-calendar-tool

      - name: Run SPY tracker
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python fetch_and_analyze.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main
          git add -f spy_data.db spy_data.json market_data.json
          git diff --staged --quiet && echo "No changes" || git commit -m "Auto: SPY data update $(date -u +'%Y-%m-%d')"
          git push || echo "Nothing to push"
